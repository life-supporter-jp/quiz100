<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面白クイズ100</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }

        :root {
            --banner-width: 50%; 
        }

        .quiz-container {
            background-color: #fff;
            padding: 30px 50px;
            border-radius: 10px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            width: 95%; 
            max-width: 450px; 
            text-align: center;
            margin: 20px auto; 
        }

        .random-banner-container {
            text-align: center;
            margin: 10px auto 25px;
            width: var(--banner-width);
            min-height: 50px;
        }

        #randomBanner {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: block;
            margin: 0 auto;
            opacity: 0;
            transition: opacity 0.3s ease-in;
        }

        h1 { color: #333; font-size: 2.2em; margin-bottom: 15px; }
        #question { font-size: 1.6em; margin-bottom: 25px; color: #333; min-height: 60px; display: flex; align-items: center; justify-content: center; text-align: left; line-height: 1.4; }
        #choices { list-style: none; padding: 0; }
        #choices li { font-size: 1.3em; background-color: #e9e9e9; padding: 12px 10px; margin: 12px 0; border-radius: 8px; cursor: pointer; transition: 0.3s; text-align: left; border: 1px solid #ccc; }
        #choices li:hover { background-color: #dcdcdc; }
        #choices li.correct { background-color: #a8e6a8; border-color: #7fbf7f; }
        #choices li.incorrect { background-color: #ff9999; border-color: #e68a8a; }
        #next-btn { padding: 12px 25px; border: none; border-radius: 8px; background-color: #007bff; color: white; font-size: 1.1em; cursor: pointer; margin-top: 20px; }
        #result { font-size: 1.4em; font-weight: bold; margin-top: 20px; }
        .hidden { display: none; }

        @media (max-width: 768px) { 
            body { padding: 10px; }
            .quiz-container { width: 92%; padding: 20px 15px; }
            #question { font-size: 1.4em; }
        }
    </style>
</head>
<body>

<img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012099.jpg" style="display: block; margin: auto; max-width: 100%; height: auto;">

<div class="quiz-container">
    <h1>面白クイズ100</h1> 
    <p style="text-align:center">会員サイト無料画像3000枚からアップ</p>
    
    <div class="random-banner-container">
        <img id="randomBanner" src="" alt="クイズイメージ">
    </div>

    <div id="quiz">
        <h2 id="question"></h2>
        <ul id="choices"></ul>
        <button id="next-btn" class="hidden">次の問題</button>
        <div id="result"></div>
    </div>
</div>

<script>
    // クイズデータ
    const quizzes = [
        { question: "1年中、ほぼ毎日働いているのに、一度も文句を言わないものは何？", answer: "カレンダー", choices: ["時計", "カレンダー", "冷蔵庫", "電柱"] },
        { question: "叩けば叩くほど、頭が良くなる（大きな音が出る）ものは何？", answer: "たいこ", choices: ["ピアノ", "たいこ", "笛", "机"] },
        { question: "買えば買うほど短くなるものは何？", answer: "ろうそく", choices: ["鉛筆", "消しゴム", "ろうそく", "紐"] },
        { question: "どこにでも行くけれど、どこにも行けないものは何？", answer: "切手", choices: ["靴", "切手", "手紙", "車輪"] },
        { question: "食べれば食べるほどお腹がすく（と言われる）ものは何？", answer: "もやし", choices: ["キュウリ", "レタス", "もやし", "セロリ"] }
    ];

    // 画像リスト（一部抜粋していますが、ここにお持ちの全リストを入れてください）
    const images = [
        "0-38.jpg", "0-39.jpg", "0-49.jpg", "0-50.jpg", "0-55.jpg", "037.jpg", "038.jpg", "039.jpg", 
        "650.jpg", "651.jpg", "652.jpg", "653.jpg", "654.jpg", "655.jpg" 
        /* ... 他の画像ファイル名もここに追加 ... */
    ];
    const imgBaseUrl = "https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/";

    let currentIdx = 0;
    let isAnswered = false;

    const questionEl = document.getElementById('question');
    const choicesEl = document.getElementById('choices');
    const nextBtn = document.getElementById('next-btn');
    const resultEl = document.getElementById('result');
    const randomBanner = document.getElementById('randomBanner');

    function loadQuiz() {
        isAnswered = false;
        const quiz = quizzes[currentIdx];
        questionEl.textContent = quiz.question;
        resultEl.textContent = '';
        nextBtn.classList.add('hidden');
        choicesEl.innerHTML = '';

        // ★画像をランダムに選んで切り替える
        randomBanner.style.opacity = 0; // 一旦透明にする（フェード用）
        const randomImgName = images[Math.floor(Math.random() * images.length)];
        randomBanner.src = imgBaseUrl + randomImgName;
        randomBanner.onload = () => { randomBanner.style.opacity = 1; };

        // 選択肢を生成
        quiz.choices.forEach(choice => {
            const li = document.createElement('li');
            li.textContent = choice;
            li.onclick = () => checkAnswer(choice, li);
            choicesEl.appendChild(li);
        });
    }

    function checkAnswer(choice, element) {
        if (isAnswered) return;
        isAnswered = true;
        const correct = quizzes[currentIdx].answer;

        if (choice === correct) {
            element.classList.add('correct');
            resultEl.innerHTML = '<span style="color:#48bb78">正解です！</span>';
        } else {
            element.classList.add('incorrect');
            resultEl.innerHTML = `<span style="color:#f56565">不正解... 正解は「${correct}」です。</span>`;
            Array.from(choicesEl.children).forEach(li => {
                if(li.textContent === correct) li.classList.add('correct');
            });
        }
        nextBtn.classList.remove('hidden');
    }

    nextBtn.onclick = () => {
        currentIdx++;
        if (currentIdx < quizzes.length) {
            loadQuiz(); // 次の問題へ行くと、画像も再度ランダムに選ばれます
        } else {
            questionEl.textContent = "全問終了です！お疲れ様でした。";
            choicesEl.innerHTML = '';
            nextBtn.classList.add('hidden');
        }
    };

    loadQuiz();
</script>
</body>
</html>
