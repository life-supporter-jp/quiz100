<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>横幅調整済みフォーマット</title>
    <style>
        /* --- 基本レイアウト設定 --- */
        body {
            margin: 0;
            padding: 10px; /* スマホ時の余白 */
            background-color: #f0f0f0;
            font-family: sans-serif;
        }

        /* --- コンテナの横幅調整（ここが重要） --- */
        .quiz-container {
            box-sizing: border-box; /* パディングを幅に含める */
            width: 100%;           /* 基本は全幅 */
            max-width: 500px;      /* PCなど大きな画面での最大幅 */
            margin: 20px auto;     /* 中央配置 */
            background-color: #fff;
            padding: 20px;         /* 内部の余白 */
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* --- 画像のレスポンシブ設定 --- */
        img {
            max-width: 100%;       /* 親要素を突き抜けない */
            height: auto;          /* 比率を維持 */
            display: block;
            margin: 0 auto;
        }

        /* --- ランダムバナー領域の調整 --- */
        .random-banner-container {
            width: 80%;            /* コンテナ内での画像の大きさ */
            margin: 15px auto;
        }

        /* --- 選択肢ボタンの調整 --- */
        #choices {
            list-style: none;
            padding: 0;
        }

        #choices li {
            box-sizing: border-box;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background-color: #e9e9e9;
            border-radius: 8px;
            cursor: pointer;
            word-wrap: break-word; /* 長いテキストの折り返し */
        }
    </style>
</head>
<body>

    <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012099.jpg" alt="header">

    <div class="quiz-container">
        <h1 style="font-size: 1.5em; text-align: center;">面白クイズ100</h1>
        
        <div class="random-banner-container">
            <img id="randomBanner" src="" alt="banner">
        </div>

        <div id="quiz">
            <h2 id="question" style="font-size: 1.2em;">ここに問題文が表示されます</h2>
            <ul id="choices">
                <li>選択肢1</li>
                <li>選択肢2</li>
            </ul>
        </div>
    </div>

</body>
</html>
