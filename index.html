        const baseUrl = "https://life-supporter.jp/sp/hxySQ4ff/VjDWurLR/images/g6s/";

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // ★ 問題と同時に画像を切り替える関数 ★
        function loadQuiz() {
            isAnswered = false;
            const currentQuiz = quizzes[currentQuizIndex];
            questionEl.innerText = currentQuiz.question;
            choicesEl.innerHTML = '';
            resultEl.innerText = '';
            
            // --- 画像のランダム切り替え処理 ---
            // 1. 一度透明にする
            const imgElement = document.getElementById('randomBanner');
            imgElement.style.opacity = 0; 

            // 2. ランダムな画像を選択
            const selectedImage = images[Math.floor(Math.random() * images.length)];

            // 3. 画像がロードされたらフェードインさせる
            imgElement.onload = function() {
                this.style.opacity = 1; // フェードイン
            };
            // 先にsrcを設定（これにより onload イベントがトリガーされる）
            imgElement.src = baseUrl + selectedImage;


            // --- 選択肢（4個）の生成処理 ---
            const otherAnswers = quizzes
                .filter((_, index) => index !== currentQuizIndex)
                .map(q => q.answer);
            
            shuffle(otherAnswers);
            let options = [currentQuiz.answer, otherAnswers[0], otherAnswers[1], otherAnswers[2]];
            shuffle(options);

            options.forEach(choice => {
                const li = document.createElement('li');
                li.innerText = choice;
                li.onclick = () => selectChoice(li);
                choicesEl.appendChild(li);
            });
            nextBtn.classList.add('hidden');
        }

        function selectChoice(selectedLi) {
            if (isAnswered) return;
            isAnswered = true;
            const currentQuiz = quizzes[currentQuizIndex];
            if (selectedLi.innerText === currentQuiz.answer) {
                selectedLi.classList.add('correct');
                resultEl.innerText = '正解です！';
                score++;
            } else {
                selectedLi.classList.add('incorrect');
                resultEl.innerText = `不正解... 正解は「${currentQuiz.answer}」`;
                Array.from(choicesEl.children).forEach(li => {
                    if (li.innerText === currentQuiz.answer) li.classList.add('correct');
                });
            }
            Array.from(choicesEl.children).forEach(li => li.style.pointerEvents = 'none');
            nextBtn.classList.remove('hidden');
        }

        // ★ 「次の問題」ボタンの処理 ★
        function nextQuiz() {
            currentQuizIndex++;
            if (currentQuizIndex < quizzes.length) {
                loadQuiz(); // 画像切り替えを含む問題ロードを実行
            } else {
                // クイズ終了時の処理（画像コンテナを非表示にする例）
                bannerContainerEl.style.display = 'none'; 
                document.getElementById('quiz').innerHTML = `<h2>終了！${score}点でした</h2><button id="restart-btn" onclick="location.reload()">もう一度挑戦する</button>`;
            }
        }

        nextBtn.onclick = nextQuiz;
        shuffle(quizzes);
        loadQuiz(); // 初回ロード
    </script>
