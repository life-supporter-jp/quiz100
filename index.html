<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面白クイズ100 - 脳トレチャレンジ</title>
    <style>
        /* --- 共通ベース設定 --- */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Hiragino Kaku Gothic Pro', 'Noto Sans JP', sans-serif; 
            margin: 0; 
            padding: 0; 
            font-size: 18px; 
            color: #333; 
            background: #f0f2f5; 
            line-height: 1.6; 
        }
        .wrap { 
            max-width: 800px; 
            margin: 0 auto; 
            background: #fff; 
            min-height: 100vh; 
            padding: 20px; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1); 
        }

        /* --- ヘッダー・バナー設定（固定） --- */
        .banner-container img { 
            max-width: 100%; 
            height: auto; 
            display: block; 
            margin: 0 auto; 
            border-radius: 8px; 
        }
        
        /* クイズ用のランダム画像エリア */
        .random-banner-container {
            text-align: center;
            margin: 15px auto;
            width: 90%;
            max-width: 400px; /* サイズが大きすぎないよう調整 */
            min-height: 150px;
            background-color: #f9f9f9;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid #eee;
        }
        #randomBanner {
            max-width: 100%;
            height: auto;
            display: block;
            transition: opacity 0.5s ease-in;
        }

        /* --- クイズカード --- */
        .quiz-card {
            background-color: #fff;
            padding: 1.5rem;
            border-radius: 1rem;
            border: 2px solid #e2e8f0;
            text-align: center;
            margin: 20px 0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .main-title { font-size: 28px; font-weight: bold; color: #4a90e2; margin-bottom: 5px; }
        .sub-text { font-size: 14px; color: #666; margin-bottom: 15px; }

        #question { 
            font-size: 1.4em; 
            font-weight: bold;
            margin: 20px 0; 
            color: #2d3748; 
            min-height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            line-height: 1.4;
        }

        /* --- 4択レイアウト --- */
        #choices { 
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            list-style: none; 
            padding: 0; 
            margin: 0 auto; 
            max-width: 600px; 
        }
        #choices li { 
            font-size: 1.1em; 
            background-color: #f8fafc; 
            padding: 15px 10px; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: 0.2s; 
            text-align: center; 
            border: 2px solid #e2e8f0; 
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #choices li:hover { background-color: #edf2f7; border-color: #cbd5e0; }
        #choices li.correct { background-color: #c6f6d5 !important; border-color: #48bb78 !important; color: #22543d; }
        #choices li.incorrect { background-color: #fed7d7 !important; border-color: #f56565 !important; color: #742a2a; }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            background-color: #4a90e2;
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .hidden { display: none !important; }
        #result { font-size: 1.3em; font-weight: bold; margin-top: 15px; min-height: 1.5em; }

        @media (max-width: 600px) {
            #choices { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="wrap">
    <div class="banner-container">
        <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012099.jpg" alt="Title">
    </div>

    <div class="quiz-card">
        <div class="main-title">面白クイズ100</div>
        <div class="sub-text">会員サイト無料画像からアップ</div>

        <div class="random-banner-container">
            <img id="randomBanner" src="" alt="クイズイメージ">
        </div>

        <div id="quiz-content">
            <div id="question">問題を読み込み中...</div>
            <ul id="choices"></ul>
            <div id="result"></div>
            <button id="next-btn" class="btn hidden">次の問題へ</button>
            <button id="restart-btn" class="btn hidden">もう一度最初から</button>
        </div>
    </div>

    <div class="footer-msg" style="font-size: 18px; font-weight: bold; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
        今回のアプリは如何だったでしょうか？他にも使えるアプリ、脳トレができるゲームや趣味に俳句、和歌などが利用できるサイトをご案内します。
    </div>

    <div class="banner-container" style="margin-top:20px;">
        <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012085.jpg">
    </div>

    <div class="qr-area" style="text-align: center; margin-top: 40px; padding-bottom: 50px;">
        <div style="font-size: 22px; font-weight: bold; margin-bottom: 20px;">以下より体験版をご確認ください。</div>
        <div style="display: flex; justify-content: center; margin-bottom: 15px;">
            <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012100.jpg" style="width: 200px;">
        </div>
        <div>
            <a href="https://life-supporter.jp/lp/HRSuykFf" style="color: #0000FF; font-size: 20px; text-decoration: underline; font-weight: bold;">
                https://life-supporter.jp/lp/HRSuykFf
            </a>
        </div>
    </div>
</div>

<script>
    const quizzes = [
        { question: "1年中、ほぼ毎日働いているのに、一度も文句を言わないものは？", choices: ["カレンダー", "時計", "冷蔵庫", "電柱"], answer: "カレンダー" },
        { question: "叩けば叩くほど、大きな音で応えてくれる楽器は何？", choices: ["ピアノ", "たいこ", "笛", "バイオリン"], answer: "たいこ" },
        { question: "買えば買うほど、使えば使うほど短くなるものは何？", choices: ["鉛筆", "ろうそく", "お金", "消しゴム"], answer: "ろうそく" },
        { question: "どこにでも行くけれど、自分では一歩も動けない、封筒の隅にいるのは？", choices: ["切手", "宛名", "のり", "郵便屋"], answer: "切手" },
        { question: "食べれば食べるほどお腹がすくと言われる、ひょろひょろした野菜は？", choices: ["アスパラ", "もやし", "ゴボウ", "ネギ"], answer: "もやし" },
        { question: "持っているだけで、冬の寒さを和らげてくれるものは？", choices: ["手袋", "カイロ", "マフラー", "お湯"], answer: "カイロ" },
        { question: "どんなに大きくても、光が当たると足元に現れる重さゼロのものは？", choices: ["影", "空気", "雲", "風"], answer: "影" },
        { question: "いつも何かを教えてくれるけれど、声を出さない、紙でできたものは？", choices: ["手紙", "本", "ノート", "新聞"], answer: "本" }
    ];

    // ★ランダムに表示する画像リストをご指定の内容に変更しました
    const randomImages = [
        "056.jpg", "037.jpg", "038.jpg", "650.jpg", "651.jpg"
    ];
    const imgBaseUrl = "https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/";

    let currentIdx = 0;
    let isAnswered = false;

    const questionEl = document.getElementById('question');
    const choicesEl = document.getElementById('choices');
    const nextBtn = document.getElementById('next-btn');
    const resultEl = document.getElementById('result');
    const randomBanner = document.getElementById('randomBanner');

    function loadQuiz() {
        isAnswered = false;
        const quiz = quizzes[currentIdx];
        questionEl.textContent = quiz.question;
        resultEl.textContent = '';
        nextBtn.classList.add('hidden');
        choicesEl.innerHTML = '';

        // ★クイズエリア内の画像をランダムに入れ替え
        randomBanner.style.opacity = 0;
        const randomImgName = randomImages[Math.floor(Math.random() * randomImages.length)];
        randomBanner.src = imgBaseUrl + randomImgName;
        randomBanner.onload = () => { randomBanner.style.opacity = 1; };

        quiz.choices.forEach(choice => {
            const li = document.createElement('li');
            li.textContent = choice;
            li.onclick = () => checkAnswer(choice, li);
            choicesEl.appendChild(li);
        });
    }

    function checkAnswer(choice, element) {
        if (isAnswered) return;
        isAnswered = true;
        const correct = quizzes[currentIdx].answer;

        if (choice === correct) {
            element.classList.add('correct');
            resultEl.innerHTML = '<span style="color:#48bb78">正解です！</span>';
        } else {
            element.classList.add('incorrect');
            resultEl.innerHTML = `<span style="color:#f56565">残念！ 正解は「${correct}」です。</span>`;
            Array.from(choicesEl.children).forEach(li => {
                if(li.textContent === correct) li.classList.add('correct');
            });
        }
        nextBtn.classList.remove('hidden');
    }

    nextBtn.onclick = () => {
        currentIdx++;
        if (currentIdx < quizzes.length) {
            loadQuiz();
        } else {
            questionEl.textContent = "全問終了！";
            choicesEl.innerHTML = '';
            nextBtn.classList.add('hidden');
            document.getElementById('restart-btn').classList.remove('hidden');
        }
    };

    document.getElementById('restart-btn').onclick = () => {
        currentIdx = 0;
        document.getElementById('restart-btn').classList.add('hidden');
        loadQuiz();
    };

    loadQuiz();
</script>
</body>
</html>
